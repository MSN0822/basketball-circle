project_id = "basketball-circle"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
# この値はローカル CLI スタック（supabase start）専用。本番の Confirm email は
# Supabase ダッシュボード（Authentication → Providers → Email）が正。
# ただし将来 config push（設定同期）を導入すると、ここが true のままだと本番の
# OFF 設定を上書きして確認メールが復活する。メール確認方式を切り替える際は
# docs/EMAIL_SWITCHOVER_RUNBOOK.md に従い、この値も同時に揃えること。
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = true
port = 54327
backend = "postgres"
